<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#060608"/>
<title>Alexandre</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
body { font-family: sans-serif; background: #060608; color: #e8e4dc; max-width: 430px; margin: 0 auto; padding-bottom: 80px; }
.page { display: none; padding: 20px; }
.page.active { display: block; }
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #0a0a12; border-top: 1px solid #1a1a28; display: flex; }
.ntab { flex: 1; padding: 14px 0; background: none; border: none; cursor: pointer; color: #444; font-size: 12px; }
.ntab.on { color: #b8f090; }
button { display: block; width: 100%; padding: 16px; margin-bottom: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; background: #b8f090; color: #060608; }
input { display: block; width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #333; border-radius: 10px; font-size: 16px; background: #111; color: #e8e4dc; }
#status { background: #111; border-radius: 10px; padding: 14px; margin-bottom: 12px; font-size: 13px; color: #b8f090; min-height: 60px; }
</style>
</head>
<body>

<!-- INICIO -->

<div id="page-dash" class="page active">
  <h2 style="margin-bottom:16px;margin-top:20px;">Dashboard</h2>
  <div id="status">Toque nos botoes abaixo</div>
  <button id="b-peso">Registrar peso</button>
  <button id="b-treino">Ver treino</button>
</div>

<!-- PESO -->

<div id="page-weight" class="page">
  <h2 style="margin-bottom:16px;margin-top:20px;">Peso do dia</h2>
  <input id="winp" type="number" placeholder="ex: 57.8" step="0.1" inputmode="decimal"/>
  <button id="b-sw">Salvar peso</button>
  <div id="w-result" style="color:#b8f090;font-size:14px;"></div>
</div>

<!-- TREINO -->

<div id="page-workout" class="page">
  <h2 style="margin-bottom:16px;margin-top:20px;">Treino</h2>
  <button id="b-a">Treino A - Peito</button>
  <button id="b-b" style="background:#7dd3fc;color:#060608;">Treino B - Costas</button>
  <button id="b-c" style="background:#c4b5fd;color:#060608;">Treino C - Pernas</button>
  <div id="wk-result" style="color:#b8f090;font-size:14px;"></div>
</div>

<div class="nav">
  <button class="ntab on" data-tab="dash">Inicio</button>
  <button class="ntab" data-tab="weight">Peso</button>
  <button class="ntab" data-tab="workout">Treino</button>
</div>

<script>
function tap(el, fn) {
  el.addEventListener('touchend', function(e) { e.preventDefault(); fn(); }, false);
  el.addEventListener('click', fn, false);
}

function goTab(id) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.ntab').forEach(function(b) { b.classList.remove('on'); });
  document.getElementById('page-' + id).classList.add('active');
  document.querySelector('[data-tab="' + id + '"]').classList.add('on');
}

window.addEventListener('load', function() {
  document.querySelectorAll('.ntab').forEach(function(btn) {
    tap(btn, function() { goTab(btn.getAttribute('data-tab')); });
  });

  tap(document.getElementById('b-peso'), function() {
    goTab('weight');
  });

  tap(document.getElementById('b-treino'), function() {
    goTab('workout');
  });

  tap(document.getElementById('b-sw'), function() {
    var v = document.getElementById('winp').value;
    if (v) {
      localStorage.setItem('peso', v);
      document.getElementById('w-result').textContent = 'Peso ' + v + 'kg salvo!';
    }
  });

  tap(document.getElementById('b-a'), function() {
    document.getElementById('wk-result').textContent = 'Treino A selecionado: Supino, Desenvolvimento, Crossover';
  });
  tap(document.getElementById('b-b'), function() {
    document.getElementById('wk-result').textContent = 'Treino B selecionado: Puxada, Remada, Rosca';
  });
  tap(document.getElementById('b-c'), function() {
    document.getElementById('wk-result').textContent = 'Treino C selecionado: Agachamento, Leg Press, Elevacao';
  });

  document.getElementById('status').textContent = 'App carregado. Toque nos botoes.';
});
</script>

</body>
</html>
