<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#060608"/>
<title>Teste Nav</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
body { font-family: sans-serif; background: #060608; color: #e8e4dc; max-width: 430px; margin: 0 auto; padding-bottom: 80px; }
button { display: block; width: 100%; padding: 18px; margin-bottom: 16px; border: none; border-radius: 10px; font-size: 18px; font-weight: 700; cursor: pointer; background: #b8f090; color: #060608; }
#log { background: #111; border-radius: 10px; padding: 14px; margin: 20px; font-size: 13px; color: #b8f090; min-height: 80px; }
/* NAV FIXO */
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #0a0a12; border-top: 1px solid #333; display: flex; z-index: 10; padding-bottom: env(safe-area-inset-bottom); }
.ntab { flex: 1; padding: 14px 0; background: none; border: none; cursor: pointer; color: #444; font-size: 11px; }
.ntab.on { color: #b8f090; }
</style>
</head>
<body>

<div id="log">Toque nos botoes abaixo e na nav...</div>

<div style="padding: 20px;">
  <button id="b1">Botao 1 - toque aqui</button>
  <button id="b2">Botao 2 - toque aqui</button>
</div>

<div class="nav">
  <button class="ntab on" id="nav1">Inicio</button>
  <button class="ntab" id="nav2">Peso</button>
  <button class="ntab" id="nav3">Treino</button>
</div>

<script>
var log = document.getElementById('log');
function addLog(msg) { log.innerHTML = msg + '<br/>' + log.innerHTML; }

window.addEventListener('load', function() {
  document.getElementById('b1').addEventListener('touchend', function(e) { e.preventDefault(); addLog('Botao 1 funcionou!'); }, false);
  document.getElementById('b1').addEventListener('click', function() { addLog('Botao 1 click!'); });
  document.getElementById('b2').addEventListener('touchend', function(e) { e.preventDefault(); addLog('Botao 2 funcionou!'); }, false);
  document.getElementById('b2').addEventListener('click', function() { addLog('Botao 2 click!'); });
  document.getElementById('nav1').addEventListener('touchend', function(e) { e.preventDefault(); addLog('Nav Inicio funcionou!'); }, false);
  document.getElementById('nav1').addEventListener('click', function() { addLog('Nav Inicio click!'); });
  document.getElementById('nav2').addEventListener('touchend', function(e) { e.preventDefault(); addLog('Nav Peso funcionou!'); }, false);
  document.getElementById('nav2').addEventListener('click', function() { addLog('Nav Peso click!'); });
  document.getElementById('nav3').addEventListener('touchend', function(e) { e.preventDefault(); addLog('Nav Treino funcionou!'); }, false);
  document.getElementById('nav3').addEventListener('click', function() { addLog('Nav Treino click!'); });
  addLog('App carregado - toque nos botoes');
});
</script>

</body>
</html>
