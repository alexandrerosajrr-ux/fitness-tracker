<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#060608"/>
<title>Teste</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;}
body{font-family:sans-serif;background:#060608;color:#e8e4dc;padding:30px 20px;}
h2{font-size:20px;margin-bottom:20px;color:#b8f090;}
button{display:block;width:100%;padding:18px;margin-bottom:16px;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;touch-action:manipulation;background:#b8f090;color:#060608;}
#log{margin-top:20px;font-size:14px;line-height:2;color:#f0b87a;}
</style>
</head>
<body>
<h2>Teste de toque</h2>
<button id="b1">Botão 1 — toque aqui</button>
<button id="b2">Botão 2 — toque aqui</button>
<div id="log">Aguardando...</div>
<script>
var log = document.getElementById('log');
function addLog(msg) {
  log.innerHTML = msg + '<br>' + log.innerHTML;
}
document.getElementById('b1').addEventListener('click', function() {
  addLog('✅ Botão 1 clicado!');
});
document.getElementById('b2').addEventListener('touchend', function(e) {
  e.preventDefault();
  addLog('✅ Botão 2 touchend!');
});
document.addEventListener('touchstart', function(e) {
  addLog('👆 touchstart em: ' + e.target.tagName);
}, {passive: true});
</script>
</body>
</html>
