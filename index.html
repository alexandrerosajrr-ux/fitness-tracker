<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#060608"/>
<title>Debug</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
body { font-family: sans-serif; background: #060608; color: #e8e4dc; padding: 20px; }
#log { background: #111; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 12px; line-height: 1.8; min-height: 100px; color: #b8f090; word-break: break-all; }
button { display: block; width: 100%; padding: 16px; margin-bottom: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; background: #b8f090; color: #060608; }
</style>
</head>
<body>
<div id="log">Iniciando...<br/></div>
<button id="b1">Teste 1 — toque aqui</button>
<button id="b2">Teste 2 — localStorage</button>
<button id="b3">Teste 3 — navegação</button>
<div id="page2" style="display:none;background:#0e0e16;border-radius:10px;padding:16px;margin-top:12px;">
  <p style="color:#b8f090;">Página 2 carregou!</p>
</div>

<script>
var log = document.getElementById('log');

function addLog(msg, color) {
  var line = document.createElement('div');
  line.style.color = color || '#b8f090';
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

// Captura todos os erros JS
window.onerror = function(msg, src, line, col, err) {
  addLog('ERRO JS: ' + msg + ' (linha ' + line + ')', '#f09090');
  return false;
};

window.addEventListener('unhandledrejection', function(e) {
  addLog('ERRO Promise: ' + e.reason, '#f09090');
});

addLog('✓ Script carregou');
addLog('✓ TODAY: ' + new Date().toISOString().split('T')[0]);

// Testa localStorage
try {
  localStorage.setItem('test', '1');
  var r = localStorage.getItem('test');
  addLog('✓ localStorage ok: ' + r);
} catch(e) {
  addLog('✗ localStorage ERRO: ' + e.message, '#f09090');
}

window.addEventListener('load', function() {
  addLog('✓ window.load disparou');

  var b1 = document.getElementById('b1');
  var b2 = document.getElementById('b2');
  var b3 = document.getElementById('b3');

  if (!b1) { addLog('✗ b1 não encontrado', '#f09090'); }
  else {
    addLog('✓ b1 encontrado');
    b1.addEventListener('click', function() { addLog('✓ b1 CLICK funcionou!', '#7dd3fc'); });
    b1.addEventListener('touchend', function(e) { e.preventDefault(); addLog('✓ b1 TOUCHEND funcionou!', '#c4b5fd'); });
  }

  if (b2) {
    b2.addEventListener('click', function() {
      try {
        localStorage.setItem('fit_test', JSON.stringify({ok: true}));
        var v = JSON.parse(localStorage.getItem('fit_test'));
        addLog('✓ localStorage salvo: ' + JSON.stringify(v), '#7dd3fc');
      } catch(e) {
        addLog('✗ localStorage ERRO: ' + e.message, '#f09090');
      }
    });
    b2.addEventListener('touchend', function(e) { e.preventDefault(); b2.click(); });
  }

  if (b3) {
    b3.addEventListener('click', function() {
      var p = document.getElementById('page2');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
      addLog('✓ navegação ok - página ' + (p.style.display === 'block' ? 'mostrada' : 'escondida'), '#7dd3fc');
    });
    b3.addEventListener('touchend', function(e) { e.preventDefault(); b3.click(); });
  }

  addLog('✓ todos os eventos bindados');
});

addLog('✓ fim do script');
</script>

</body>
</html>
